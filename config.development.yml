# Development config for AutopsyGuard - safe for local testing
# Points to a local example case directory inside the repo.
case_dir: ./example_case

# Poll frequently for quick feedback while developing
poll_interval: 5.0

# Hang detection (shorter for dev)
hang_cpu_threshold: 1.0
hang_timeout: 120.0
hang_confirmation_duration: 30.0
log_stale_timeout: 300.0

# Resource thresholds (conservative for dev testing)
cpu_warning_percent: 95.0
cpu_warning_duration: 60.0
memory_warning_percent: 90.0
disk_min_free_gb: 1.0

# Solr settings (if not used, these are benign defaults)
solr_port: 23232
solr_timeout_seconds: 5.0
solr_ping_timeout: 3.0
solr_ping_slow_threshold: 3.0
solr_ping_slow_duration: 30.0
solr_slow_threshold_seconds: 2.0
solr_slow_count_threshold: 3
solr_heap_usage_warning: 85.0
solr_heap_usage_critical: 95.0
solr_cpu_warning: 90.0

# Log patterns to detect
error_patterns:
  - java.lang.OutOfMemoryError
  - SEVERE
  - Exception
  - FATAL
  - StackOverflowError

# Local SMTP server for testing (e.g., MailHog or smtp4dev)
smtp_host: "localhost"
smtp_port: 1025
smtp_user: ""
smtp_password: ""
email_sender: "AutopsyGuard <autopsyguard-dev@local>"
email_recipient: "dev@local"

# Faster reporting while developing
report_interval_hours: 0.5 # Mudado para 1 hora (estava 0.04) para não te spammar nas aulas

# WhatsApp notifications (via CallMeBot) — disabled by default
# Setup: save +34 611 08 28 80 in your contacts, send "I allow callmebot to send me messages"
# You'll receive an API key to put here (or set AUTOPSYGUARD_WHATSAPP_APIKEY env var)
whatsapp_enabled: false
whatsapp_phone: ""      # e.g. "+351912345678"
whatsapp_apikey: ""     # your CallMeBot API key

# Telegram notifications (via CallMeBot) — disabled by default
# Setup: send a message to @CallMeBot_txtbot on Telegram
# You'll use your telegram username (e.g. @yourusername)
telegram_enabled: false
telegram_user: ""       # e.g. "@myusername"
