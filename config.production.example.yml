# =============================================================================
# AutopsyGuard Configuration
# Environment: Production
# =============================================================================
# PURPOSE: Conservative thresholds calibrated for real forensic casework.
# Autopsy ingest can legitimately saturate CPU for hours and write hundreds of
# GB to Solr. Thresholds must distinguish genuine crashes from heavy processing.
#
# Usage:
#   copy config.production.example.yml config.yml
#   uv run autopsyguard
#
# BEFORE RUNNING — set credentials as environment variables:
#   Windows: $Env:AUTOPSYGUARD_SMTP_PASSWORD = "your-app-password"
#   Linux/macOS: export AUTOPSYGUARD_SMTP_PASSWORD="your-app-password"
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Target Directories
# -----------------------------------------------------------------------------
# Path to the Autopsy case directory (must contain .aut file)
case_dir: "C:/Cases/Evidence-2025-001"

# Optional: Path to Autopsy installation (helps locate crash logs)
autopsy_install_dir: "C:/Program Files/Autopsy-4.22.1"

# -----------------------------------------------------------------------------
# 2. Polling & Hang Detection
# -----------------------------------------------------------------------------
# Polling interval in seconds (30s is responsive but low overhead)
poll_interval: 30.0

# Hang detection thresholds
# 900s = 15 min. Covers long legitimate quiet phases (hashing, export).
hang_cpu_threshold: 1.0
hang_timeout: 900.0
hang_confirmation_duration: 180.0
log_stale_timeout: 1800.0

# -----------------------------------------------------------------------------
# 3. Resource Warning Thresholds
# -----------------------------------------------------------------------------
# Alert if resource usage exceeds these limits
cpu_warning_percent: 95.0
cpu_per_core_warning_percent: 88.0
# 900s = 15 min sustained heavy CPU
cpu_warning_duration: 900.0

memory_warning_percent: 88.0
disk_min_free_gb: 20.0

# -----------------------------------------------------------------------------
# 4. Solr Service Monitoring
# -----------------------------------------------------------------------------
# Default Solr port for Autopsy 4.22.1
solr_port: 23232
solr_timeout_seconds: 10.0
solr_ping_timeout: 8.0
solr_ping_slow_threshold: 4.0
solr_ping_slow_duration: 120.0
solr_unresponsive_duration: 60.0
solr_slow_threshold_seconds: 3.0
solr_slow_count_threshold: 5

solr_heap_usage_warning: 85.0
solr_heap_usage_critical: 95.0
solr_cpu_warning: 90.0

# -----------------------------------------------------------------------------
# 5. Log Error Signatures
# -----------------------------------------------------------------------------
# Triggers a warning if these case-insensitive strings appear in the logs.
# 'Exception' is deliberately excluded here to reduce noise from benign traces.
error_patterns:
  - "java.lang.OutOfMemoryError"
  - "StackOverflowError"
  - "FATAL"
  - "SEVERE"
  - "IngestJobStartException"
  - "TskCoreException"
  - "TskDataException"
  - "org.sqlite.SQLiteException"
  - "org.postgresql.util.PSQLException"
  - "SolrServerException"
  - "org.apache.solr.common.SolrException"
  - "java.lang.NullPointerException"
  - "java.io.IOException"

# -----------------------------------------------------------------------------
# 6. Notifications & Reporting
# -----------------------------------------------------------------------------
# Frequency of status heartbeat emails
report_interval_hours: 12.0

# Email Settings
smtp_host: "smtp.gmail.com"
smtp_port: 587
smtp_use_ssl: false  # false = STARTTLS (correct for Gmail/O365)
smtp_async: true
smtp_auth_mode: "password"   # "password" or "oauth"
smtp_user: ""        # Provide via AUTOPSYGUARD_SMTP_USER
smtp_password: ""    # Provide via AUTOPSYGUARD_SMTP_PASSWORD
smtp_oauth_provider: ""      # "google" or "microsoft" when smtp_auth_mode="oauth"
smtp_oauth_client_id: ""     # OAuth app client id
smtp_oauth_client_secret: "" # Prefer AUTOPSYGUARD_SMTP_OAUTH_CLIENT_SECRET in .env
smtp_oauth_tenant: "common"  # Microsoft tenant ("common" for multi-tenant)
smtp_oauth_token_file: ""    # Local JSON token file created by autopsyguard-oauth
email_sender: "autopsyguard@forensics.yourdomain.com"
email_recipient: "forensic-team@yourdomain.com"
email_case_label: "Evidence Case 2025-001"

# WhatsApp Notifications (via CallMeBot)
whatsapp_enabled: false
whatsapp_phone: ""        # e.g. "+351912345678"
whatsapp_apikey: ""       # Provide via AUTOPSYGUARD_WHATSAPP_APIKEY

# Telegram Notifications (via CallMeBot)
telegram_enabled: false
telegram_user: ""         # e.g. "@myusername"
