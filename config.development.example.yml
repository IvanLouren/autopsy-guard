# =============================================================================
# AutopsyGuard Configuration
# Environment: Development
# =============================================================================
# PURPOSE: Optimized for local testing and active development.
# Thresholds are low and polling is fast to provide immediate feedback.
#
# Usage:
#   copy config.development.example.yml config.yml
#   uv run autopsyguard
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Target Directories
# -----------------------------------------------------------------------------
# Path to the Autopsy case directory (must contain .aut file)
case_dir: "./example_case"

# Optional: Path to Autopsy installation (helps locate crash logs)
# autopsy_install_dir: "C:/Program Files/Autopsy-4.22.1"

# -----------------------------------------------------------------------------
# 2. Polling & Hang Detection
# -----------------------------------------------------------------------------
# Polling interval in seconds (fast for development)
poll_interval: 5.0

# Hang detection thresholds (lower for quick testing)
hang_cpu_threshold: 1.0
hang_timeout: 120.0
hang_confirmation_duration: 30.0
log_stale_timeout: 300.0

# -----------------------------------------------------------------------------
# 3. Resource Warning Thresholds
# -----------------------------------------------------------------------------
# Alert if resource usage exceeds these limits
cpu_warning_percent: 95.0
cpu_per_core_warning_percent: 90.0
cpu_warning_duration: 60.0
memory_warning_percent: 90.0
disk_min_free_gb: 1.0

# -----------------------------------------------------------------------------
# 4. Solr Service Monitoring
# -----------------------------------------------------------------------------
solr_port: 23232
solr_timeout_seconds: 5.0
solr_ping_timeout: 3.0
solr_ping_slow_threshold: 3.0
solr_ping_slow_duration: 30.0
solr_unresponsive_duration: 15.0
solr_slow_threshold_seconds: 2.0
solr_slow_count_threshold: 3

solr_heap_usage_warning: 85.0
solr_heap_usage_critical: 95.0
solr_cpu_warning: 90.0

# -----------------------------------------------------------------------------
# 5. Log Error Signatures
# -----------------------------------------------------------------------------
# Triggers a warning if these case-insensitive strings appear in the logs
error_patterns:
  - "java.lang.OutOfMemoryError"
  - "SEVERE"
  - "Exception"
  - "FATAL"
  - "StackOverflowError"

# -----------------------------------------------------------------------------
# 6. Notifications & Reporting
# -----------------------------------------------------------------------------
# Frequency of status heartbeat emails
report_interval_hours: 0.5

# Email Settings (Testing with local server like MailHog)
smtp_host: "localhost"
smtp_port: 1025
smtp_use_ssl: false
smtp_async: true
smtp_auth_mode: "password"
smtp_user: ""
smtp_password: ""
smtp_oauth_provider: ""
smtp_oauth_client_id: ""
smtp_oauth_client_secret: ""
smtp_oauth_tenant: "common"
smtp_oauth_token_file: ""
email_sender: "autopsyguard-dev@local"
email_recipient: "dev@local"
email_case_label: "Dev Test Case"

# WhatsApp Notifications (via CallMeBot)
whatsapp_enabled: false
whatsapp_phone: ""  # e.g. "+351912345678"
whatsapp_apikey: "" # your CallMeBot API key

# Telegram Notifications (via CallMeBot)
telegram_enabled: false
telegram_user: ""   # e.g. "@myusername"
