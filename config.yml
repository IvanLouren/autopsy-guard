case_dir: C:\Cases\MyCase
autopsy_install_dir: C:\Program Files\Autopsy

poll_interval: 10.0

hang_cpu_threshold: 1.0
hang_timeout: 300.0
log_stale_timeout: 600.0

cpu_warning_percent: 95.0
cpu_warning_duration: 300.0
memory_warning_percent: 90.0
disk_min_free_gb: 1.0

solr_port: 23232
solr_timeout_seconds: 5.0
solr_slow_threshold_seconds: 2.0
solr_slow_count_threshold: 3
solr_heap_usage_warning: 85.0
solr_heap_usage_critical: 95.0
solr_cpu_warning: 90.0

error_patterns:
  - java.lang.OutOfMemoryError
  - SEVERE
  - Exception
  - FATAL
  - StackOverflowError

# --- Email Notification Settings ---
smtp_host: "smtp.gmail.com"
smtp_port: 587
smtp_user: "[EMAIL_ADDRESS]"
smtp_password: "[PASSWORD]"
email_sender: "AutopsyGuard <[EMAIL_ADDRESS]>"
email_recipient: "[EMAIL_ADDRESS]"

# --- Periodic Reporting ---
# Send a status email every X hours (even if there are no errors)
report_interval_hours: 0.005
